<!doctype html> 
<html>
    <head>
        <title>Example</title>
        <style>
            div~p {
                background-color: cyan;
            }
            h2+p{
                background-color: blue;
            }
        </style>
    </head>
    <body>
        <h1>H1 outside div</h1>
        <p>P1 outside div</p>
        <div>
            <h2>H2 inside div</h2>
            <p>P1 inside div</p>
            <p>P2 inside div</p>
            <h3>H3 inside div</h3> 
                    
        </div>
        <p>P2 outside div</p>
    </body> 
</html>
