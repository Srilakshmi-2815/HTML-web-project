<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(173, 135, 135);
        }
        h1{
            background-color: yellow;
            color: rgb(120, 43, 43);
        }
        body>p{
            background-color: powderblue;
            color: rgb(43, 34, 34);
        }
        div p{
            background-color: orange;
            color: rgb(148, 148, 217);
        }
        div>p{
            background-color: cyan;
            color: rgb(135, 131, 131);
        }
        .nesteddiv p{
            background-color: navy;
            color: rgb(206, 114, 129);
        }
        div>p:first-of-type{
            background-color: rgb(70, 16, 6);
        }
        span p{
            background-color: rgb(216, 153, 164);
            color: darkblue;
        }
        .nesteddiv p{
            background-color: rgb(51, 86, 51);
            color: maroon;
        }
        .nesteddiv>p{
            background-color: rgb(237, 237, 223);
            color: purple;
        }
        span{
            background-color: rgb(126, 80, 80);
        }
    </style>
</head>
<body>
    <h1>h1 HEADER</h1>
    <p id="first">p outside div</p>
    <div>
        <p>p directly inside div</p>
        <span>
            <p>p inside span inside div</p>
        </span>
        <p>p directly inside div</p>
        <div class="nesteddiv">
            <p>p inside nested div</p>
            <span>
                <p>p inside span inside nested div</p>
            </span>
            <span>
                <p>p inside span inside nested div</p>
            </span>
            <p>p inside nested div</p>
        </div>
        <p>p directly inside div</p>
    </div>
    <p>p outside div</p>
</body>
</html>
