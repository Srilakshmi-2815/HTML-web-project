<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    <form action="">
        <h1>course registration datails</h1>
        <fieldset>
            <legend> user details</legend>
            <table>
                <tr>
                    <td><label for="">first name</label></td>
                    <td><input type="text" name = "name" placeholder="Srilakshmi" required> <br></td>
                </tr>
                <tr>
                    <td><label for="">surname</label></td>
                    <td><input type="text" name = "surname"> <br></td>
                </tr>
                <tr>
                    <td><label for="">mobile number</label></td>
                    <td><input type="tel"> <br></td>
                </tr>
                <tr>
                    <td> <label for="">email</label></td>
                    <td><input type="text" placeholder="srilureddy@gamil.com"> <br></td>
                </tr>
                <tr>
                    <td> <label for="">password</label></td>
                    <td><input type="password"> <br></td>
                </tr>
                <tr>
                    <td><label for="">confirm password</label></td>
                    <td><input type="password"></td>
                </tr>
                <tr>
                    <td><label for="">date of birth</label></td>
                    <td><input type="date"></td>
                </tr>
                <tr>
                    <td><label for="">age</label></td>
                    <td><input type="numbers"></td>
                </tr>
                <tr>
                    <td><label for="">gender</label></td>
                    <td>
                        <input type="radio" name ="gender" value="male">male
                        <input type="radio" name ="gender" value="female">female
                        <input type="radio" name ="gender" value="others">others
                    </td>
                </tr>
                <tr>
                    <td><label for="">select country</label></td>
                    <td>
                        <select name="country" id="">
                            <option value="india">india</option>
                            <option value="usa">usa</option>
                            <option value="uk">uk</option>
                            <option value="canada">canada</option>
                        </select>
                <tr>
                    <td><label for="">upload picture</label></td>
                    <td><input type="file"></td>
                </tr>
                    </td>
                </tr>
                <tr>
                    <td><input type="reset"></td>
                </tr>
                
                
            
            </table>
        </fieldset>
        <h1>course details</h1>
        <fieldset>
            <legend>course details</legend>
            <table>
                <tr>
                    <td><label for="">select course</label></td>
                    <td><select name="country" id="">
                        <option value="python full stack">python full stack</option>
                        <option value="java full stack">java full stack</option>
                        <option value="data science">data science</option>
                        <option value="web development">web development</option>
                    </select></td>
                </tr>
                <tr>
                    <td><label for="">delivery mode</label></td>
                    <td>
                        <input type="radio" name="mode">online
                        <input type="radio" name="mode">offline
                    </td>
                </tr>
                <tr>
                    <td><label for="">institute name</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label for="">comments</label></td>
                    <td><textarea name="comments" rows = "6" cols="40" id=""></textarea></td>
                </tr>
            </table>
        </fieldset>

        <button type="Submit"> Submit</button>
    </form>
</body>
</html>
