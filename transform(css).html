<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        section{
            margin-top: 50px;
        }
        h1{
             text-align: center;
        }
        div{
            height: 70px;
            width: 150px;
            border: 3px solid;
            margin: 15px auto;
            text-align: center;
            background-color: aqua;
        }
        #one{
            transform: translate(150px);
        }
        #two{
            transform: rotate(45deg);
        }
        #three{
            transform: scale(0.6);
        }
        #four{
            transform:skew(45deg);
        }
        #five{
            transform:rotate(25deg) skew(30deg);
         }
    </style>
</head>
<body>
    <h1>Transforms</h1>

    <section>
        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="four">4</div>
        <div id="five">5</div>
    </section>
    
</body>
</html>
